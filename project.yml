name: CloudTape
options:
  bundleIdPrefix: io.github.junnakarai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "6"
targets:
  CloudTape:
    type: application
    platform: iOS
    sources:
      - path: CloudTape
    info:
      path: CloudTape/SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: CloudTape
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.junnakarai.cloudtape
        INFOPLIST_FILE: CloudTape/SupportingFiles/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MU94BSN9Y3
schemes:
  CloudTape:
    build:
      targets:
        CloudTape: all
    run:
      config: Debug
      storeKitConfiguration: Configuration/CloudTape.storekit
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
