name: iOS CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project CloudTape.xcodeproj \
            -scheme CloudTape \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/cloudtape-derived" \
            build

      - name: Test on iOS Simulator
        run: |
          set -euo pipefail
          DESTINATION="$(xcodebuild \
            -project CloudTape.xcodeproj \
            -scheme CloudTape \
            -showdestinations |
            awk -F'[{}]' '/platform:iOS Simulator/ && /name:iPhone/ { print $2; exit }')"

          if [ -z "$DESTINATION" ]; then
            echo "No iOS Simulator destination found."
            exit 1
          fi

          xcodebuild \
            -project CloudTape.xcodeproj \
            -scheme CloudTape \
            -destination "{$DESTINATION}" \
            -derivedDataPath "$RUNNER_TEMP/cloudtape-test-derived" \
            test
