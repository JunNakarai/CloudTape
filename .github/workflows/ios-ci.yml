name: iOS CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project CloudTape.xcodeproj \
            -scheme CloudTape \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/cloudtape-derived" \
            build

      - name: Test on iOS Simulator
        run: |
          set -euo pipefail
          RUNTIME_ID="$(xcrun simctl list runtimes available |
            awk '/iOS/ { runtime=$NF } END { if (runtime != "") print runtime }')"
          DEVICE_TYPE_ID="$(xcrun simctl list devicetypes |
            awk -F'[()]' '
              /iPhone/ { fallback=$2 }
              /iPhone 16/ { print $2; found=1; exit }
              END { if (!found && fallback != "") print fallback }
            ')"

          if [ -z "$RUNTIME_ID" ] || [ -z "$DEVICE_TYPE_ID" ]; then
            echo "No compatible iOS Simulator runtime/device type found."
            exit 1
          fi

          DEVICE_ID="$(xcrun simctl create CloudTape-CI "$DEVICE_TYPE_ID" "$RUNTIME_ID")"

          xcodebuild \
            -project CloudTape.xcodeproj \
            -scheme CloudTape \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -destination-timeout 120 \
            -derivedDataPath "$RUNNER_TEMP/cloudtape-test-derived" \
            test
